<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jitsu Cardiff</title>

<style>
:root {
  --accent: #b91c1c;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

.hero {
  position: relative;
  height: 50vh;
  min-height: 320px;
  background: url('hero.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.5);
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: 2.5rem;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.lead {
  font-size: 1.1rem;
  max-width: 700px;
  margin: 0 auto 30px;
  text-align: center;
}

.grid {
  display: grid;
  gap: 24px;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.card {
  background: var(--card);
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,.08);
  padding: 16px;
}

.card h2 {
  margin-top: 0;
}

iframe {
  width: 100%;
  height: 360px;
  border: 0;
  border-radius: 10px;
}

.links {
  text-align: center;
  margin-top: 30px;
}

.links a {
  display: inline-block;
  margin: 6px;
  padding: 10px 16px;
  border-radius: 999px;
  text-decoration: none;
  background: var(--accent);
  color: white;
  font-weight: 500;
}

footer {
  text-align: center;
  font-size: .9rem;
  padding: 30px 20px;
  opacity: .7;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>Jitsu Cardiff</h1>
    <p>Traditional Jiu Jitsu in Cardiff</p>
  </div>
</section>

<div class="container">

  <p class="lead">
    Friendly, structured classes focused on practical self-defence, fitness,
    and progression. Beginners always welcome.
  </p>

  <div class="grid">

    <div class="card">
      <h2>Class Schedule</h2>
      <iframe src="CALENDAR_EMBED_LINK"></iframe>
    </div>

    <div class="card">
      <h2>Location</h2>
      <iframe src="MAP_EMBED_LINK"></iframe>
    </div>

  </div>

  <div class="links">
    <a href="#">Join / Contact</a>
    <a href="#">Facebook</a>
    <a href="#">Instagram</a>
  </div>

</div>

<footer>
  © Jitsu Cardiff
</footer>

</body>
</html>
